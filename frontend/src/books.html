<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-8">

    <!-- Book Catalogue -->
    <div class="w-full max-w-2xl bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Browse Books</h1>
        <p class="text-center text-sm text-gray-500 mb-6">Select books to add to your cart. Suggestions will appear below.</p>

        <div id="catalogue"></div>
    </div>

    <!-- Suggestions Section (hidden until cart has items) -->
    <div id="suggestions-section" class="w-full max-w-2xl bg-white p-6 rounded-lg shadow-md mt-4 hidden">
        <h2 class="text-lg font-semibold text-gray-700 mb-1">You Might Also Enjoy</h2>
        <p class="text-sm text-gray-500 mb-4">Based on your selections:</p>
        <ul id="suggestions-list" class="space-y-2"></ul>
    </div>

    <!-- Cart Bar (hidden until cart has items) -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-300 shadow-lg px-6 py-4 hidden">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-sm font-semibold text-gray-700">Cart (<span id="cart-count">0</span> books)</p>
                <p class="text-xs text-gray-500 mt-0.5" id="cart-items-text"></p>
            </div>
            <button onclick="proceedToCheckout()" class="bg-blue-600 text-white font-medium py-2 px-5 rounded-lg hover:bg-blue-700 text-sm">
                Proceed to Checkout →
            </button>
        </div>
    </div>

    <div class="h-24"></div>

    <script>
        const CATALOGUE = {
            "Magical Realism": [
                { title: "100 Years of Solitude", author: "Gabriel García Márquez" },
                { title: "Feast of the Goat", author: "Mario Vargas Llosa" },
                { title: "The House of Spirits", author: "Isabel Allende" },
            ],
            "Classic Literature": [
                { title: "Brothers Karamazov", author: "Fyodor Dostoevsky" },
                { title: "Les Misérables", author: "Victor Hugo" },
                { title: "The Iliad", author: "Homer" },
            ],
            "Fantasy": [
                { title: "Lord of the Rings", author: "J.R.R. Tolkien" },
                { title: "The Name of the Wind", author: "Patrick Rothfuss" },
                { title: "The Chronicles of Narnia", author: "C.S. Lewis" },
            ],
            "Sci-Fi": [
                { title: "Dune", author: "Frank Herbert" },
                { title: "Neuromancer", author: "William Gibson" },
                { title: "Foundation", author: "Isaac Asimov" },
            ],
            "Literary Fiction": [
                { title: "Midnight's Children", author: "Salman Rushdie" },
                { title: "God of Small Things", author: "Arundhati Roy" },
                { title: "The Grapes of Wrath", author: "John Steinbeck" },
            ],
        };

        let cart = [];

        function renderCatalogue() {
            const container = document.getElementById('catalogue');
            for (const [genre, books] of Object.entries(CATALOGUE)) {
                const section = document.createElement('div');
                section.className = 'mb-6';
                section.innerHTML = `<h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">${genre}</h2><ul class="space-y-2"></ul>`;
                const ul = section.querySelector('ul');
                books.forEach(book => {
                    const li = document.createElement('li');
                    li.className = 'flex justify-between items-center bg-gray-100 p-3 rounded-lg';
                    li.id = `book-${book.title.replace(/\s+/g, '-')}`;
                    li.innerHTML = `
                        <div>
                            <span class="font-medium text-gray-800">${book.title}</span>
                            <span class="text-sm text-gray-500 ml-2">— ${book.author}</span>
                        </div>
                        <button onclick="toggleCart('${book.title.replace(/'/g, "\\'")}', '${book.author.replace(/'/g, "\\'")}', this)"
                            class="text-sm bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600 transition-colors">
                            + Add
                        </button>
                    `;
                    ul.appendChild(li);
                });
                container.appendChild(section);
            }
        }

        function toggleCart(title, author, btn) {
            const inCart = cart.find(b => b.title === title);
            const row = document.getElementById(`book-${title.replace(/\s+/g, '-')}`);

            if (inCart) {
                cart = cart.filter(b => b.title !== title);
                btn.textContent = '+ Add';
                btn.className = 'text-sm bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600 transition-colors';
                row.classList.remove('bg-blue-50');
                row.classList.add('bg-gray-100');
            } else {
                cart.push({ title, author, quantity: 1 });
                btn.textContent = '✓ Added';
                btn.className = 'text-sm bg-blue-600 border border-blue-600 text-white px-3 py-1 rounded';
                row.classList.remove('bg-gray-100');
                row.classList.add('bg-blue-50');
            }

            updateCartBar();
            fetchSuggestions();
        }

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            const countEl = document.getElementById('cart-count');
            const textEl = document.getElementById('cart-items-text');

            countEl.textContent = cart.length;
            textEl.textContent = cart.map(b => b.title).join(', ');

            if (cart.length > 0) bar.classList.remove('hidden');
            else bar.classList.add('hidden');
        }

        async function fetchSuggestions() {
            const section = document.getElementById('suggestions-section');
            const list = document.getElementById('suggestions-list');

            if (cart.length === 0) {
                section.classList.add('hidden');
                list.innerHTML = '';
                return;
            }

            try {
                const response = await fetch('http://localhost:8081/suggestions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ book_titles: cart.map(b => b.title) })
                });

                const result = await response.json();
                const suggestions = result.suggestions || [];

                list.innerHTML = '';

                if (suggestions.length === 0) {
                    list.innerHTML = '<li class="text-sm text-gray-500 italic">No more suggestions — you\'ve covered all the genres!</li>';
                } else {
                    suggestions.forEach(book => {
                        const li = document.createElement('li');
                        li.className = 'flex justify-between items-center bg-gray-100 p-3 rounded-lg';
                        li.id = `book-${book.title.replace(/\s+/g, '-')}`;
                        li.innerHTML = `
                            <div>
                                <span class="font-medium text-gray-800">${book.title}</span>
                                <span class="text-sm text-gray-500 ml-2">— ${book.author}</span>
                            </div>
                            <button onclick="toggleCart('${book.title.replace(/'/g, "\\'")}', '${book.author.replace(/'/g, "\\'")}', this)"
                                class="text-sm bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600 transition-colors">
                                + Add
                            </button>
                        `;
                        list.appendChild(li);
                    });
                }

                section.classList.remove('hidden');
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (err) {
                console.error('Could not fetch suggestions:', err);
            }
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Please add at least one book to your cart.');
                return;
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            window.location.href = '/index.html';
        }

        renderCatalogue();
    </script>
</body>
</html>
