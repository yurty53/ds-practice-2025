<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Book Shop - Select Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-3xl bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-4">Book Shop — Choose your books</h1>

    <ul id="catalog" class="space-y-3"></ul>

    <div class="mt-6 flex justify-between items-center">
      <a href="cart.html" class="text-sm text-gray-600 underline">Go to Cart</a>
      <button id="viewCartBtn" class="bg-blue-600 text-white px-4 py-2 rounded">View Cart</button>
    </div>
  </div>

  <script>
    const booksCatalog = [
      { id: "b1", title: "Book A", author: "Author A", genres: ["Fiction","Romance"], price: 9.99 },
      { id: "b2", title: "Book B", author: "Author B", genres: ["History","Non-Fiction"], price: 12.50 },
      { id: "b3", title: "Book C", author: "Author C", genres: ["Science Fiction","Adventure"], price: 8.75 },
      { id: "b4", title: "Book D", author: "Author D", genres: ["Mystery","Thriller"], price: 14.90 },
      { id: "b5", title: "Book E", author: "Author E", genres: ["Biography","History"], price: 7.00 },
      { id: "b6", title: "Book F", author: "Author F", genres: ["Fantasy","Adventure"], price: 11.25 },
      { id: "b7", title: "Book G", author: "Author G", genres: ["Romance","Drama"], price: 6.50 },
      { id: "b8", title: "Book H", author: "Author H", genres: ["Crime","Thriller"], price: 15.00 },
      { id: "b9", title: "Book I", author: "Author I", genres: ["Business","Self-Help"], price: 10.00 },
      { id: "b10", title: "Book J", author: "Author J", genres: ["Philosophy","Non-Fiction"], price: 9.25 }
    ];

    const catalog = document.getElementById('catalog');

    booksCatalog.forEach(book => {
      const li = document.createElement('li');
      li.className = "flex items-center justify-between bg-gray-100 p-3 rounded-lg";

      li.innerHTML = `
        <label class="flex items-center space-x-3">
          <input type="checkbox" class="book-checkbox" data-id="${book.id}">
          <div class="flex flex-col">
            <span class="font-medium">${book.title}</span>
            <span class="text-sm text-gray-600">by ${book.author} • <em class="text-xs">${book.genres.join(', ')}</em></span>
          </div>
        </label>
        <div class="flex items-center space-x-3">
          <span class="text-sm font-medium">${book.price.toFixed(2)} $</span>
          <input type="number" min="1" value="1" data-id="${book.id}" class="w-16 border rounded p-1 qty-input" disabled>
        </div>
      `;
      catalog.appendChild(li);

      const cb = li.querySelector('.book-checkbox');
      const qty = li.querySelector('.qty-input');
      cb.addEventListener('change', e => { qty.disabled = !e.target.checked; });
    });

    document.getElementById('viewCartBtn').addEventListener('click', () => {
      const items = [];
      document.querySelectorAll('.book-checkbox').forEach(cb => {
        if (cb.checked) {
          const id = cb.getAttribute('data-id');
          const book = booksCatalog.find(b => b.id === id);
          const qty = parseInt(document.querySelector(`.qty-input[data-id="${id}"]`).value || '1', 10);
          items.push({ id: book.id, name: book.title, price: book.price, quantity: qty, genres: book.genres });
        }
      });
      localStorage.setItem('cart', JSON.stringify(items));
      window.location.href = 'cart.html';
    });
  </script>
</body>
</html>
