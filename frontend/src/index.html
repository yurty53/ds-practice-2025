<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8 flex gap-6 items-start">

        <!-- LEFT: Scrollable Book Catalogue -->
        <div class="w-7/12 bg-white p-6 rounded-lg shadow-md">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Browse Books</h1>
            <p class="text-center text-sm text-gray-500 mb-6">Select books to add to your cart.</p>
            <div id="catalogue"></div>
        </div>

        <!-- RIGHT: Fixed Sidebar -->
        <div class="w-5/12 flex-shrink-0">
            <div class="sticky top-8 flex flex-col gap-4">

                <!-- Cart Summary -->
                <div class="bg-white rounded-lg shadow-md p-4">
                    <h2 class="text-sm font-bold text-gray-700 uppercase tracking-wider mb-3">Your Cart</h2>
                    <div id="cart-empty" class="text-sm text-gray-400 italic">No books added yet.</div>
                    <ul id="cart-list" class="space-y-1 hidden"></ul>
                    <button id="checkout-btn" onclick="proceedToCheckout()"
                        class="mt-4 w-full bg-blue-600 text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-700 text-sm hidden">
                        Proceed to Checkout →
                    </button>
                </div>

                <!-- Suggestions -->
                <div class="bg-white rounded-lg shadow-md p-4">
                    <h2 class="text-sm font-bold text-gray-700 uppercase tracking-wider mb-1">Suggested For You</h2>
                    <p class="text-xs text-gray-400 mb-3">Based on your selections</p>
                    <div id="suggestions-empty" class="text-sm text-gray-400 italic">Add a book to get suggestions.</div>
                    <ul id="suggestions-list" class="space-y-2 hidden"></ul>
                </div>

            </div>
        </div>

    </div>

    <script>
        let CATALOGUE = {};
        let cart = [];

        async function renderCatalogue() {
            const container = document.getElementById('catalogue');
            container.innerHTML = '<p class="text-sm text-gray-500">Loading books from the database...</p>';

            try {
                const response = await fetch('http://localhost:8081/catalogue');
                const result = await response.json();
                CATALOGUE = result.catalogue || {};
            } catch (err) {
                console.error('Could not load catalogue:', err);
                container.innerHTML = '<p class="text-sm text-red-500">Could not load the catalogue from the database.</p>';
                return;
            }

            container.innerHTML = '';
            for (const [genre, books] of Object.entries(CATALOGUE)) {
                const section = document.createElement('div');
                section.className = 'mb-6';
                section.innerHTML = `<h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">${genre}</h2><ul class="space-y-2"></ul>`;
                const ul = section.querySelector('ul');
                books.forEach(book => {
                    const idSlug = book.title.replace(/\s+/g, '-');
                    const li = document.createElement('li');
                    li.className = 'flex justify-between items-center bg-gray-100 p-3 rounded-lg';
                    li.id = `book-${idSlug}`;
                    li.innerHTML = `
                        <div>
                            <span class="font-medium text-gray-800 text-sm">${book.title}</span>
                            <span class="text-xs text-gray-500 ml-2">— ${book.author}</span>
                        </div>
                        <button class="text-sm bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600 transition-colors flex-shrink-0 ml-2">
                            + Add
                        </button>
                    `;
                    li.querySelector('button').addEventListener('click', function() {
                        toggleCart(book.title, book.author);
                    });
                    ul.appendChild(li);
                });
                container.appendChild(section);
            }
        }

        function toggleCart(title, author) {
            const inCart = cart.find(b => b.title === title);
            if (inCart) {
                cart = cart.filter(b => b.title !== title);
            } else {
                cart.push({ title, author, quantity: 1 });
            }
            updateCatalogueStates();
            updateCartSidebar();
            fetchSuggestions();
        }

        function updateCatalogueStates() {
            for (const [genre, books] of Object.entries(CATALOGUE)) {
                books.forEach(book => {
                    const row = document.getElementById(`book-${book.title.replace(/\s+/g, '-')}`);
                    if (!row) return;
                    const btn = row.querySelector('button');
                    const inCart = cart.find(b => b.title === book.title);
                    if (inCart) {
                        btn.textContent = '✓ Added';
                        btn.className = 'text-sm bg-blue-600 border border-blue-600 text-white px-3 py-1 rounded flex-shrink-0 ml-2';
                        row.classList.remove('bg-gray-100');
                        row.classList.add('bg-blue-50');
                    } else {
                        btn.textContent = '+ Add';
                        btn.className = 'text-sm bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600 transition-colors flex-shrink-0 ml-2';
                        row.classList.remove('bg-blue-50');
                        row.classList.add('bg-gray-100');
                    }
                });
            }
        }

        function updateCartSidebar() {
            const emptyMsg = document.getElementById('cart-empty');
            const cartList = document.getElementById('cart-list');
            const checkoutBtn = document.getElementById('checkout-btn');

            if (cart.length === 0) {
                emptyMsg.classList.remove('hidden');
                cartList.classList.add('hidden');
                checkoutBtn.classList.add('hidden');
                cartList.innerHTML = '';
            } else {
                emptyMsg.classList.add('hidden');
                cartList.classList.remove('hidden');
                checkoutBtn.classList.remove('hidden');
                cartList.innerHTML = cart.map(b =>
                    `<li class="text-sm text-gray-700 flex items-start gap-1">
                        <span class="text-blue-500 mt-0.5">•</span>
                        <span>${b.title}</span>
                    </li>`
                ).join('');
            }
        }

        async function fetchSuggestions() {
            const emptyMsg = document.getElementById('suggestions-empty');
            const list = document.getElementById('suggestions-list');

            if (cart.length === 0) {
                emptyMsg.textContent = 'Add a book to get suggestions.';
                emptyMsg.classList.remove('hidden');
                list.classList.add('hidden');
                list.innerHTML = '';
                return;
            }

            try {
                const response = await fetch('http://localhost:8081/suggestions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ book_titles: cart.map(b => b.title) })
                });

                const result = await response.json();
                const suggestions = result.suggestions || [];

                list.innerHTML = '';

                if (suggestions.length === 0) {
                    emptyMsg.textContent = 'You\'ve covered all the genres!';
                    emptyMsg.classList.remove('hidden');
                    list.classList.add('hidden');
                } else {
                    emptyMsg.classList.add('hidden');
                    list.classList.remove('hidden');
                    suggestions.forEach(book => {
                        const inCart = cart.find(b => b.title === book.title);
                        const li = document.createElement('li');
                        li.className = `flex justify-between items-center p-2 rounded-lg ${inCart ? 'bg-blue-50' : 'bg-gray-100'}`;
                        li.innerHTML = `
                            <div class="flex-1 min-w-0 mr-2">
                                <div class="text-sm font-medium text-gray-800 truncate">${book.title}</div>
                                <div class="text-xs text-gray-500 truncate">${book.author}</div>
                            </div>
                            <button class="text-xs flex-shrink-0 ${inCart ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-gray-300 text-gray-700 hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600'} border px-2 py-1 rounded transition-colors">
                                ${inCart ? '✓' : '+ Add'}
                            </button>
                        `;
                        li.querySelector('button').addEventListener('click', function() {
                            toggleCart(book.title, book.author);
                        });
                        list.appendChild(li);
                    });
                }

            } catch (err) {
                emptyMsg.textContent = 'Could not load suggestions.';
                emptyMsg.classList.remove('hidden');
                list.classList.add('hidden');
                console.error('Could not fetch suggestions:', err);
            }
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Please add at least one book to your cart.');
                return;
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            window.location.href = '/checkout.html';
        }

        renderCatalogue();
    </script>
</body>
</html>
