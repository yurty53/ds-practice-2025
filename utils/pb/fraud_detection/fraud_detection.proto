syntax = "proto3";
package fraud_detection;

service FraudDetectionService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
    rpc CheckUserFraud (UserFraudRequest) returns (FraudEventResponse);
    rpc CheckCreditCardFraud (CardFraudRequest) returns (FraudEventResponse);
}

message InitOrderRequest {
    string order_id = 1;
    string user_name = 2;
    string user_contact = 3;
    string card_number = 4;
    string expiration_date = 5;
}

message InitOrderResponse {
    bool success = 1;
}

message UserFraudRequest {
    string order_id = 1;
    map<string, int32> vector_clock = 2;
}

message CardFraudRequest {
    string order_id = 1;
    map<string, int32> vector_clock = 2;
}

message FraudEventResponse {
    bool is_fraud = 1;
    string reason = 2;
    map<string, int32> vector_clock = 3;
}