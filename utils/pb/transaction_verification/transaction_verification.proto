syntax = "proto3";

package transaction_verification;

service TransactionVerificationService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
    rpc VerifyItems (VerifyRequest) returns (VerifyResponse);
    rpc VerifyUserData (VerifyRequest) returns (VerifyResponse);
    rpc VerifyCreditCard (VerifyRequest) returns (VerifyResponse);
    rpc ClearOrder (ClearRequest) returns (ClearResponse);
}

message InitOrderRequest {
    string order_id        = 1;
    repeated string items  = 2;
    string user_name       = 3;
    string user_contact    = 4;
    string card_number     = 5;
    string expiration_date = 6;
}

message InitOrderResponse {
    bool success = 1;
}

message VerifyRequest {
    string order_id = 1;
    map<string, int32> vector_clock = 2;
}

message VerifyResponse {
    bool is_valid = 1;
    string reason = 2;
    map<string, int32> vector_clock = 3;
}

message ClearRequest {
    string order_id = 1;
    map<string, int32> vector_clock = 2;
}

message ClearResponse {
    bool success = 1;
}