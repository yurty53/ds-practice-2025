syntax = "proto3";

package transaction_verification;

service TransactionVerificationService {
    rpc VerifyItems (VerifyItemsRequest) returns (VerifyResponse);
    rpc VerifyUserData (VerifyUserDataRequest) returns (VerifyResponse);
    rpc VerifyCreditCard (VerifyCreditCardRequest) returns (VerifyResponse);
}

message VerifyItemsRequest {
    repeated string items = 1;
}

message VerifyUserDataRequest {
    string name    = 1;
    string contact = 2;
    string street  = 3;
    string city    = 4;
    string state   = 5;
    string zip     = 6;
    string country = 7;
}

message VerifyCreditCardRequest {
    string number          = 1;
    string expiration_date = 2;
    string cvv             = 3;
}

message VerifyResponse {
    bool   is_valid = 1;
    string reason   = 2;
}